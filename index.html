<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>지자체 협력사업 예산 심사 자동 판정</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&family=Noto+Sans+KR:wght@400;500;700&family=Roboto+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">

    <header class="letterhead">
      <div class="emblem" aria-hidden="true">
        <svg viewBox="0 0 60 60" width="44" height="44">
          <circle cx="30" cy="30" r="27" fill="none" stroke="currentColor" stroke-width="2"/>
          <circle cx="30" cy="30" r="20" fill="none" stroke="currentColor" stroke-width="1"/>
          <text x="30" y="37" text-anchor="middle" font-size="16" font-family="'Noto Serif KR', serif" fill="currentColor">審</text>
        </svg>
      </div>
      <p class="doc-no">문서번호 &middot; BUDGET-2026-AUTO</p>
      <h1>지자체 협력사업 예산 심사 자동 판정</h1>
      <p class="subtitle">한도액 = 인구수 &times; 10 &nbsp;/&nbsp; 신청액이 한도액을 초과하면 <b>반려</b>, 이하이면 <b>승인</b></p>
    </header>

    <section class="summary" id="summary" aria-live="polite"></section>

    <section class="table-wrap">
      <table id="review-table">
        <thead>
          <tr>
            <th scope="col">지자체명</th>
            <th scope="col">인구수</th>
            <th scope="col">신청액</th>
            <th scope="col">한도액</th>
            <th scope="col">판정</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </section>

    <footer class="footnote">
      <p>※ 본 판정은 인구수 기준 자동 산정 규칙(한도액 = 인구수 &times; 10)에 따른 결과이며, 최종 승인 여부는 담당 부서의 검토를 거쳐 확정됩니다.</p>
    </footer>

  </main>

  <script src="app.js"></script>

</html>
